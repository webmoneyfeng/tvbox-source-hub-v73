name: source-health

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run check
      - run: npm run audit:sources
        env:
          TVBOX_BASE: https://tv.webhome.eu.org
      - run: npm run audit:free-tier
