name: full-refresh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run check
      - run: npm run audit:coverage
        env:
          TVBOX_BASE: https://tv.webhome.eu.org
      - run: npm run generate:snapshot
        env:
          SNAPSHOT_SOURCE_BASE: https://tv.webhome.eu.org
          PUBLIC_BASE: https://tv.webhome.eu.org
