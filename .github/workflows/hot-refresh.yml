name: hot-refresh

on:
  workflow_dispatch:
  schedule:
    # Free-first: 6-hour static hot snapshot; Worker Cron + app interactions keep visible freshness.
    - cron: '7 */6 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run check
      - run: npm run generate:hot-snapshot
        env:
          HOT_SOURCE_BASE: https://tv.webhome.eu.org
          PUBLIC_BASE: https://tv.webhome.eu.org
      - run: npm run audit:update-sla
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist audit
          git diff --cached --quiet && echo "No snapshot changes" || git commit -m "chore(snapshot): refresh v7.3 snapshot"
          git push
