name: deep-verify

on:
  workflow_dispatch:
  schedule:
    - cron: '31 3 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run check
      - run: npm run audit:remote-full
        env:
          TVBOX_BASE: https://tv.webhome.eu.org
          AUDIT_LIMIT: 24
          AUDIT_DETAIL_SAMPLE: 5
          AUDIT_PLAY_SAMPLE: 2
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit
          git diff --cached --quiet && echo "No snapshot changes" || git commit -m "chore(snapshot): refresh v7.3 snapshot"
          git push
