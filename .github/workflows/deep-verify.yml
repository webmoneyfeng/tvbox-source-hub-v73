name: deep-verify

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run check
      - run: npm run audit:remote-full
        env:
          TVBOX_BASE: https://tv.webhome.eu.org
          AUDIT_LIMIT: 24
          AUDIT_DETAIL_SAMPLE: 5
          AUDIT_PLAY_SAMPLE: 2
